<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FAME OF XTAZY</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

.title{
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin-top:40px;
    margin-bottom:40px;
    letter-spacing:5px;
    color:#fff;
    text-shadow:0 0 25px #ff0055;
}

.main-container{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:20px;
    flex-wrap:wrap;
}

.button-trail-left,
.button-trail-right{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.trail-btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:white;
    background:#111;
    padding:15px;
    width:320px;
    border-radius:16px;
    transition:.3s;
    border:1px solid #222;
    overflow:hidden;
}

.trail-btn:hover{
    transform:translateY(-4px);
    border-color:#ff0055;
    box-shadow:0 0 25px rgba(255,0,85,.4);
}

.trail-btn img{
    width:55px;
    height:55px;
    border-radius:50%;
}

.status{
    width:12px;
    height:12px;
    border-radius:50%;
    margin-left:auto;
}

.status.online{
    background:#43b581;
}

.status.idle{
    background:#faa61a;
}

.status.dnd{
    background:#f04747;
}

.status.offline{
    background:#747f8d;
}

.presence-popup{
    position:absolute;
    left:0;
    bottom:-100%;
    width:100%;
    background:#181818;
    padding:15px;
    transition:.3s;
    border-top:1px solid #333;
}

.trail-btn:hover .presence-popup{
    bottom:0;
}

.activity-details{
    margin-bottom:10px;
}

.activity-type{
    font-weight:bold;
    margin-bottom:5px;
    color:#ff0055;
}

.activity-info,
.activity-state,
.activity-time{
    font-size:13px;
    opacity:.8;
    margin-top:3px;
}

.discord-widgets-container{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    padding:40px;
}

.discord-widget{
    width:320px;
    background:#111;
    border-radius:18px;
    overflow:hidden;
    border:1px solid #222;
    text-align:center;
    transition:.3s;
}

.discord-widget:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(255,0,85,.4);
}

.discord-banner{
    width:100%;
    height:120px;
    background:#1f1f1f;
    background-size:cover;
    background-position:center;
}

.server-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-top:-45px;
    border:5px solid #111;
}

.server-name{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

.online-members{
    margin-top:8px;
    opacity:.8;
}

.join-server-btn{
    display:inline-block;
    margin:20px 0;
    padding:10px 20px;
    background:#ff0055;
    color:white;
    text-decoration:none;
    border-radius:12px;
    transition:.3s;
}

.join-server-btn:hover{
    background:#ff3377;
}

.music-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#ff0055;
    color:white;
    font-size:24px;
    cursor:pointer;
    z-index:999;
}

</style>
</head>

<body>

<h1 class="title">FAME OF XTAZY</h1>

<div class="main-container">

    <div class="button-trail-left"></div>

    <div class="button-trail-right"></div>

</div>

<div class="discord-widgets-container"></div>

<button id="music-toggle" class="music-toggle">
    <i class='bx bx-music'></i>
</button>

<audio id="background-music" loop autoplay>
    <source src="https://files.catbox.moe/8xq1y5.mp3" type="audio/mpeg">
</audio>

<script>

const d = {
    "1208442702853832784": "Shaun",
    "818356510575820852": "shion",
    "1281160013896880180": "soap",
    "1021349535030706217": "aaron",
    "1277688537814405181": "nate",
    "903645314509054004": "shinra",
    "1366307105346158652": "salemx",
    "904570082062114846": "Piatos",
    "952234330703409172": "Rsica",
    "674734302982045706": "x777",
    "1126159558897828052": "zy",
};

const r = {
    "955918485593141308": "ella",
    "616961997300432907": "cents",
    "1043950342603296899": "chiyooo",
    "809916082532909057": "john",
    "415786064238608394": "kwatro",
    "1240387556202516524": "hemera",
    "726110048287326288": "mavi",
    "918805451158749214": "raitokeyks",
    "1282293211393429555": "isiaah",
    "782985667209723924": "yunik",
    "1208033952473022545": "envy",
    "314709108601126913": "lucid",
    "1362884990936809522": "Scott",
    "1135876905405521961": "kacy",
    "246408830068588547": "Pattycakes",
    "1387105042921951284": "hoexiana",
    "1062146270191435886": "Ishaqt",
    "768048674507849738": "rhaxil",
    "780337080215404555": "nilla",
    "748783074497527830": "somi",
};

const GG = t =>
['Playing','Streaming','Listening to','Watching','Custom Status:','Competing in'][t] || 'Playing';

const UU = (i,m,s) => {

Promise.all(

i.map(userId =>

fetch(`https://api.lanyard.rest/v1/users/${userId}`)
.then(r => r.json())

))

.then(results => {

const html = results.map(result => {

const data = result.data;

if(!data) return '';

const discord_user = data.discord_user;
const discord_status = data.discord_status;
const activities = data.activities;
const spotify = data.spotify;

const userName = m[discord_user.id];

const profileUrl =
`https://xtazy.world/${userName}`;

const avatarUrl =
`https://cdn.discordapp.com/avatars/${discord_user.id}/${discord_user.avatar}.png`;

let activityHtml = '';

if(spotify){

activityHtml = `
<div class="activity-details">
<div class="activity-type">
<i class="fab fa-spotify"></i>
Listening to Spotify
</div>

<div class="activity-info">
${spotify.song}
</div>

<div class="activity-state">
${spotify.artist}
</div>
</div>
`;

}

else if(activities?.length > 0){

activities.forEach(activity => {

if(activity.type !== 4){

activityHtml += `
<div class="activity-details">

<div class="activity-type">
${GG(activity.type)} ${activity.name}
</div>

${activity.details ?
`<div class="activity-info">${activity.details}</div>` : ''}

${activity.state ?
`<div class="activity-state">${activity.state}</div>` : ''}

</div>
`;
}

});
}

return `
<a href="${profileUrl}"
class="trail-btn"
target="_blank">

<img src="${avatarUrl}">

${discord_user.username}

<span class="status ${discord_status}"></span>

<div class="presence-popup">
${activityHtml || 'No activity'}
</div>

</a>
`;

}).join('');

document.querySelector(s).innerHTML = html;

});

};

const FF = () => {

UU(Object.keys(d), d, '.button-trail-left');

UU(Object.keys(r), r, '.button-trail-right');

};

const EE = () => {

const b = document.getElementById('background-music');

const t = document.getElementById('music-toggle');

b.volume = 0.5;

b.play().catch(() => {});

t.addEventListener('click', () => {

if(b.paused){

b.play();

t.innerHTML = "<i class='bx bx-music'></i>";

}else{

b.pause();

t.innerHTML = "<i class='bx bx-music-off'></i>";

}

});

};

const WW = () => {

const invites = [
"ftUawVDVSY",
"revshit",
"aknem"
];

Promise.all(

invites.map(code =>

fetch(`https://discord.com/api/v9/invites/${code}?with_counts=true`)
.then(r => r.json())

))

.then(results => {

const container =
document.querySelector('.discord-widgets-container');

container.innerHTML = '';

results.forEach(server => {

if(!server.guild) return;

container.innerHTML += `

<div class="discord-widget">

<div class="discord-banner"
style="background-image:url('https://cdn.discordapp.com/banners/${server.guild.id}/${server.guild.banner}.png?size=1024')">
</div>

<img class="server-icon"
src="https://cdn.discordapp.com/icons/${server.guild.id}/${server.guild.icon}.png">

<div class="server-name">
${server.guild.name}
</div>

<div class="online-members">
${server.approximate_presence_count}
Online /
${server.approximate_member_count}
Members
</div>

<a class="join-server-btn"
href="https://discord.gg/${server.code}"
target="_blank">

Join Server

</a>

</div>
`;

});

});

};

document.addEventListener('DOMContentLoaded', () => {

EE();

FF();

WW();

setInterval(FF,10000);

});

</script>

</body>
</html>
